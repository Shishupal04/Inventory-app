{% extends "base.html" %}

{% block content %}

<div class="row mb-4">

<div class="col-md-3">
<div class="card shadow p-3">
<h6>Total Products</h6>
<h3>{{ total_products }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h6>Total Sold</h6>
<h3>{{ total_sold }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h6>Total Profit</h6>
<h3>{{ total_profit }}</h3>
</div>
</div>

</div>

<div class="card shadow p-3">
<h5>Profit Trend</h5>
<canvas id="profitChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = {{ chart_labels | tojson }};
const data = {{ chart_data | tojson }};

const ctx = document.getElementById('profitChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Profit',
            data: data,
            tension: 0.3
        }]
    },
    options: {
        responsive: true
    }
});
</script>

{% endblock %}
