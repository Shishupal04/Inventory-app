<!DOCTYPE html>

    <title>Add Product</title>
</head>
<body>

<h2>Add Product</h2>

<form method="POST">
    <input type="text" name="product_name" placeholder="Product Name" required><br><br>
    <input type="number" name="opening_stock" placeholder="Opening Stock" required><br><br>
    <label>Purchase Price</label>
    <input type="number" step="0.01" name="purchase_price" required>

    <label>Selling Price</label>
<input type="number" step="0.01" name="selling_price" required>
    <button type="submit">Add Product</button>
</form>
