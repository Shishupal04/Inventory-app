<h2>Daily Sales Report</h2>

<form method="GET">
    <input type="date" name="date">
    <button type="submit">Filter</button>
</form>

<table border="1">
<tr>
<th>Date</th>
<th>Product</th>
<th>Quantity</th>
<th>Revenue</th>
</tr>

{% for sale, product in report_data %}
<tr>
<td>{{ sale.date }}</td>
<td>{{ product.product_name }}</td>
<td>{{ sale.quantity_sold }}</td>
<td>{{ sale.quantity_sold * product.selling_price }}</td>
</tr>
{% endfor %}
</table>

<br><br>

<a href="/export">Download Excel</a>

</body>
</html>
